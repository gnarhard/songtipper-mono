server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    # Vite-built assets (long cache)
    location /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Static files — try disk first, fall back to PHP (needed for
    # Livewire's route-served JS: /livewire-xxx/livewire.js)
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|woff2?|ttf|svg|webp)$ {
        try_files $uri /index.php?$query_string;
        expires 7d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Longer timeout for AI-powered endpoints
        fastcgi_read_timeout 120s;
    }

    # Deny dotfiles (except .well-known for Let's Encrypt)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
